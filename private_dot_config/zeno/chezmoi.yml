snippets:
  - name: "[cmo] chezmoi"
    keyword: cmo
    snippet: chezmoi
  - name: "[cmoad] add file to chezmoi source"
    keyword: cmoad
    snippet: chezmoi add
  - name: "[cmodif] preview changes before applying"
    keyword: cmodif
    snippet: chezmoi diff
  - name: "[cmoapl] apply source state to home"
    keyword: cmoapl
    snippet: chezmoi apply -v
  - name: "[cmoread] sync edits back to source"
    keyword: cmoread
    snippet: chezmoi re-add
  - name: "[cmomng] list managed files"
    keyword: cmomng
    snippet: chezmoi managed --include=files --path-style=absolute
  - name: "[cmodstr] remove file from chezmoi management"
    keyword: cmodstr
    snippet: chezmoi destroy
  - name: "[cmoedt] open managed dotfile in VS Code"
    keyword: cmoedt
    snippet: "{ file=$(chezmoi managed --include=files --path-style=absolute | fzf) && code --new-window \"$file\"; }"
