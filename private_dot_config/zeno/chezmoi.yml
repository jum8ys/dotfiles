snippets:
  - name: "[cmo] chezmoi"
    keyword: cmo
    snippet: chezmoi
  - name: "[cmoad] add file to chezmoi source"
    keyword: cmoad
    snippet: chezmoi add
  - name: "[cmodif] preview changes before applying"
    keyword: cmodif
    snippet: chezmoi diff
  - name: "[cmoapl] apply source state to home"
    keyword: cmoapl
    snippet: chezmoi apply -v
  - name: "[cmorad] sync edits back to source"
    keyword: cmorad
    snippet: chezmoi re-add
