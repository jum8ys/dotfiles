snippets:
  - name: "[ls] list files"
    keyword: ls
    snippet: ls -FG
  - name: "[ll] list files (long format)"
    keyword: ll
    snippet: ls -alG
  - name: "[cp] copy with confirmation"
    keyword: cp
    snippet: cp -i
  - name: "[mv] move with confirmation"
    keyword: mv
    snippet: mv -i
  - name: "[rm] remove with confirmation"
    keyword: rm
    snippet: rm -i
  - name: "[crontab] edit crontab safely"
    keyword: crontab
    snippet: crontab -i
  - name: "[r] reload shell"
    keyword: r
    snippet: exec $SHELL -l
  - name: "[G] pipe to grep"
    keyword: G
    snippet: '| grep'
    context:
      lbuffer: '.+\s'
  - name: "[null] redirect to /dev/null"
    keyword: "null"
    snippet: ">/dev/null 2>&1"
    context:
      lbuffer: ".+\\s"

completions:
  - name: kill signal
    patterns:
      - "^kill -s $"
    sourceCommand: "kill -l | tr ' ' '\\n'"
    options:
      --prompt: "'Kill Signal> '"

  - name: kill pid
    patterns:
      - "^kill( .*)? $"
    excludePatterns:
      - " -[lns] $"
    sourceCommand: "LANG=C ps -ef | sed 1d"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
    callback: "awk '{print $2}'"

  - name: chdir
    patterns:
      - "^cd $"
    sourceCommand: "find . -path '*/.git' -prune -o -maxdepth 5 -type d -print0"
    options:
      --read0: true
      --prompt: "'Chdir> '"
      --preview: "cd {} && ls -a | sed '/^[.]*$/d'"
    callback: "gcut -z -c 3-"
    callbackZero: true
